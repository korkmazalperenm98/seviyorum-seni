<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nisa'm İçin ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Dancing Script', cursive; 
            background: linear-gradient(135deg, #ffcc33 0%, #cc99ff 100%);
            overflow: hidden;
            touch-action: none;
            padding: 20px;
            position: relative;
        }

        @keyframes rotateFlower {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .flower {
            position: absolute;
            pointer-events: none; /* Tıklamayı engellemez */
            opacity: 0.5;
            z-index: 1; 
            animation: rotateFlower 4s linear infinite;
        }

        #mesaj { 
            font-weight: bold; 
            text-align: center; 
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 50px;
            z-index: 10;
            transition: all 0.3s ease;
            line-height: 1.3;
            max-width: 90%;
            font-size: 36px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 50; /* Butonları en üste al */
            position: relative;
            min-height: 200px;
        }

        #evetBtn { 
            background-color: rgba(255, 255, 255, 0.95); 
            color: #ff8c00; /* Turuncu yazı */
            border: none; 
            padding: 18px 35px; border-radius: 50px; 
            cursor: pointer; 
            font-family: 'Dancing Script', cursive;
            font-size: 24px; 
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: transform 0.2s ease;
            margin-bottom: 20px;
        }

        #hayirBtn { 
            background-color: rgba(255, 255, 255, 0.2); 
            color: white; border: 2px solid white; 
            padding: 10px 25px; border-radius: 50px; 
            cursor: pointer; 
            font-family: 'Dancing Script', cursive;
            font-size: 18px;
            position: fixed; /* Kaçması için sabit pozisyon */
            bottom: 20%;
            backdrop-filter: blur(5px);
            transition: all 0.1s ease;
            white-space: nowrap;
        }

        .final-glass {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(20px);
            padding: 40px 25px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body id="body">

    <div id="mesaj">Seni çok seviyorum Nisa'm ♥</div>

    <div class="btn-container" id="container">
        <button id="evetBtn" onclick="evetTikla()">Ben de seni çok seviyorum Alperen'im ♥</button>
        <button id="hayirBtn" onmouseover="kac()" ontouchstart="kac()" onclick="kac()">götünü yerim</button>
    </div>

        function cicekleriEkle() {
            const body = document.getElementById('body');
            for (let i = 0; i < 80; i++) {
                let f = document.createElement('div');
                f.className = 'flower';
                f.innerText = '🌸';
                f.style.left = Math.random() * 100 + 'vw';
                f.style.top = Math.random() * 100 + 'vh';
                f.style.fontSize = (Math.random() * 20 + 10) + 'px';
                f.style.animationDuration = (Math.random() * 3 + 2) + 's';
                body.appendChild(f);
            }
        }
        window.onload = cicekleriEkle;
