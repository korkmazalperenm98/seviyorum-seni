<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nisa'm İçin ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Dancing Script', cursive; 
            background: linear-gradient(135deg, #ffcc33 0%, #cc99ff 100%);
            overflow: hidden;
            touch-action: none;
            padding: 20px;
            position: relative;
        }

        @keyframes rotateFlower {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .flower {
            position: absolute;
            pointer-events: none; 
            opacity: 0.4;
            z-index: 1; 
            animation: rotateFlower 4s linear infinite;
            user-select: none;
        }

        #mesaj { 
            font-weight: bold; 
            text-align: center; 
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 50px;
            z-index: 10;
            transition: all 0.4s ease;
            line-height: 1.3;
            max-width: 90%;
            font-size: 36px;
        }

        .btn-container {
            display: flex;
            gap: 25px;
            flex-direction: column;
            align-items: center;
            z-index: 20;
            position: relative;
        }

        #evetBtn { 
            background-color: rgba(255, 255, 255, 0.95); 
            color: #d63384; border: none; 
            padding: 18px 35px; border-radius: 50px; 
            cursor: pointer; 
            font-family: 'Dancing Script', cursive;
            font-size: 22px; 
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: transform 0.2s ease;
            z-index: 30;
        }

        #hayirBtn { 
            background-color: rgba(255, 255, 255, 0.15); 
            color: rgba(255,255,255,0.9); border: 2px solid white; 
            padding: 10px 25px; border-radius: 50px; 
            cursor: pointer; 
            font-family: 'Dancing Script', cursive;
            font-size: 18px;
            position: absolute; 
            top: 110%; 
            backdrop-filter: blur(5px);
            z-index: 30;
            transition: all 0.1s ease;
            white-space: nowrap;
        }

        .final-glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            padding: 40px 25px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            z-index: 50;
        }
    </style>
</head>
<body id="body">

    <div id="mesaj">Seni çok seviyorum Nisa'm ♥</div>

    <div class="btn-container" id="container" style="min-height: 150px;">
        <button id="evetBtn" onclick="evetTikla()">Ben de seni çok seviyorum Alperen'im ♥</button>
        <button id="hayirBtn" onmouseover="kac()" ontouchstart="kac()" onclick="kac()">götünü yerim</button>
    </div>

    <script>
        window.onload = function() {
            const flowerCount = 60;
            const body = document.getElementById('body');
            const flowers = ['🌸', '💮'];

            for (let i = 0; i < flowerCount; i++) {
                let f = document.createElement('div');
                f.className = 'flower';
                f.innerText = flowers[Math.floor(Math.random() * flowers.length)];
                f.style.left = Math.random() * 95 + 'vw';
                f.style.top = Math.random() * 95 + 'vh';
                f.style.fontSize = (Math.random() * 15 + 15) + 'px';
                f.style.animationDuration = (Math.random() * 3 + 2) + 's';
                body.appendChild(f);
            }
        };

        let fSize = 36;
        let evetScale = 1;
        let tiklamaSayisi = 0;
        let finalMod = false;

        function evetTikla() {
            tiklamaSayisi++;
            fSize += 8;
            evetScale += 0.2;
            
            const mesajEl = document.getElementById('mesaj');
            const evetBtn = document.getElementById('evetBtn');
            const hayirBtn = document.getElementById('hayirBtn');

            mesajEl.style.fontSize = fSize + "px";
            evetBtn.style.transform = `scale(${evetScale})`;

            if(tiklamaSayisi >= 5) {
                finalMod = true;
                patlat();
                mesajEl.innerHTML = "Bir gün seninle mutlu bir yuva kuracağız sevgilim. Her yeni güne birlikte uyanacağız. Her zerremle aşığım...";
                mesajEl.classList.add("final-glass");
                mesajEl.style.fontSize = "30px";
                
                evetBtn.style.display = 'none';
                hayirBtn.style.display = 'none'; // Önce bi kaybolsun

                // 4 saniye sonra geri gelsin ama artık kaçmasın
                setTimeout(() => {
                    hayirBtn.style.display = 'block';
                    hayirBtn.style.position = 'relative';
                    hayirBtn.style.top = '0';
                    hayirBtn.style.left = '0';
                    hayirBtn.style.marginTop = '20px';
                    hayirBtn.style.backgroundColor = "white";
                    hayirBtn.style.color = "#d63384";
                    // Kaçma fonksiyonunu iptal etmek için yeni bir tıklama atıyoruz
                    hayirBtn.onmouseover = null;
                    hayirBtn.ontouchstart = null;
                    hayirBtn.onclick = finalCevap;
                }, 4000);
            }
        }

        function kac() {
            if(finalMod) return; // Finalde kaçmasın
            const btn = document.getElementById('hayirBtn');
            const newX = Math.random() * (window.innerWidth - btn.clientWidth - 20);
            const newY = Math.random() * (window.innerHeight - btn.clientHeight - 20);
            btn.style.position = 'fixed';
            btn.style.left = newX + 'px';
            btn.style.top = newY + 'px';
        }

        function finalCevap() {
            const mesajEl = document.getElementById('mesaj');
            mesajEl.innerHTML += "<br><br><span style='color:yellow; font-size: 36px;'>Biliyorum, ben de senin götünü yerim ♥</span>";
            document.getElementById('hayirBtn').style.display = 'none';
            patlat(); // Tekrar konfeti!
        }

        function patlat() {
            var duration = 10 * 1000;
            var animationEnd = Date.now() + duration;
            var interval = setInterval(function() {
              var timeLeft = animationEnd - Date.now();
              if (timeLeft <= 0) return clearInterval(interval);
              confetti({ particleCount: 40, spread: 360, origin: { x: Math.random(), y: Math.random() - 0.2 } });
            }, 250);
        }
    </script>
</body>
</html>
